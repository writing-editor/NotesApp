name: Build Electron Linux App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'AppCode/**'
      - 'electron/**'
      - '.github/workflows/build-electron-linux.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      # Deletes every past manuscript-linux artifact before this run builds
      # and uploads a fresh one. Runs on every trigger of this workflow (no
      # schedule), and only ever touches its own artifact name, so it never
      # deletes anything belonging to the Android build. The new artifact
      # this run is about to upload is left alone — its lifetime is governed
      # by this repo's own retention setting (Settings → Actions → General →
      # "Artifact and log retention"), not by this step.
      - name: Delete previous manuscript-linux artifacts
        uses: actions/github-script@v8
        with:
          script: |
            let page = 1;
            let deleted = 0;
            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'manuscript-linux',
                per_page: 100,
                page,
              });
              if (data.artifacts.length === 0) break;
              for (const a of data.artifacts) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id,
                });
                deleted++;
              }
              page++;
            }
            console.log(`Deleted ${deleted} previous manuscript-linux artifact(s).`);

  build:
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install AppCode dependencies
        working-directory: AppCode
        # puppeteer is a listed dependency but its lib/pdf.js consumer is not
        # currently wired into server.js (PDF export goes through lib/typst.js
        # instead) — skip its ~200MB Chrome-for-Testing download so it can't
        # flake or slow down the build for a browser binary nothing calls.
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: npm install

      - name: Build editor bundle (CodeMirror 6 live-preview editor)
        working-directory: AppCode
        run: npm run build:editor

      - name: Install AppCode production dependencies (bundled into the app)
        working-directory: AppCode
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: npm install --omit=dev

      - name: Install electron-builder Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      - name: Ensure app icon set exists
        # icon.png and icons/*.png are committed to the repo (generated from
        # mobile/store-assets/playstore-icon-512.png), so this only runs the
        # generator if someone deletes them. A single flat PNG passed to
        # electron-builder's linux.icon causes some launchers/app-grids to
        # fall back to a generic icon, hence the full multi-size set.
        run: |
          if [ ! -f electron/build-resources/icon.png ] || [ -z "$(ls -A electron/build-resources/icons 2>/dev/null)" ]; then
            pip install --break-system-packages --quiet pillow
            python3 electron/build-resources/generate-icons.py
          fi

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      # dpkg happily reinstalls a .deb over an existing install without
      # uninstalling first — that already works today. What was missing is
      # a version bump: package.json's version was hardcoded at 1.0.0 on
      # every build, so every .deb/.AppImage was version-identical, which
      # made it look like nothing had changed even when it had. Tying the
      # patch number to the CI run number gives every build a distinct,
      # always-increasing version with no manual bumping required.
      - name: Set package version from this run
        working-directory: electron
        run: npm version "1.0.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Build Linux packages (.deb and AppImage)
        working-directory: electron
        run: npm run dist:linux
        env:
          # No code signing / auto-update publishing configured — this is a
          # local, unsigned build artifact produced purely by CI.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: manuscript-linux
          path: |
            electron/dist/*.deb
            electron/dist/*.AppImage