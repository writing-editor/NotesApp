name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'AppCode/**'
      - 'mobile/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AppCode dependencies
        working-directory: AppCode
        run: npm install

      - name: Build editor bundle (CodeMirror 6 live-preview editor)
        working-directory: AppCode
        run: npm run build:editor

      - name: Install mobile dependencies
        working-directory: mobile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm install --legacy-peer-deps

      - name: Sync server files & generate node package.json
        working-directory: mobile
        run: npm run sync-files

      - name: Install embedded Node.js dependencies
        working-directory: mobile/www/nodejs
        run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Capacitor Android project exists
        working-directory: mobile
        run: |
          if [ ! -f android/gradlew ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Overlay custom app icons
        run: cp -r mobile/icon-assets/. mobile/android/app/src/main/res/

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk