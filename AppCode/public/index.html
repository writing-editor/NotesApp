<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Manuscript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/ai-panel.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Collapse sidebar (Ctrl+\)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="sidebar-head">
      <div class="sidebar-title">Manuscript</div>
      <div class="sidebar-book" id="book-title">Loading…</div>
      <div class="sidebar-author" id="book-author" style="font-family:var(--font-ui);font-size:0.58rem;color:var(--ink-faint);margin-top:0.25rem;letter-spacing:0.06em;"></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div style="display:flex; border-top: 1px solid var(--rule);">
      <div class="sidebar-footer" id="folder-action" style="flex:1; border-right: 1px solid var(--rule); justify-content:center;">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        <span>Vault</span>
      </div>
      <div class="sidebar-footer" id="settings-action" style="flex:1; border-right: 1px solid var(--rule); justify-content:center; position:relative;">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54A.5.5 0 0 0 14 2h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.77 8.48a.5.5 0 0 0 .12.64l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.34.68.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.28.27.42.5.42H14c.24 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.24.09.51 0 .68-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.21-1.6zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>
        <span>Sync</span>
        <span id="sync-pending-badge" title="Changes pending on the remote" style="display:none; position:absolute; top:6px; right:calc(50% - 26px); width:8px; height:8px; border-radius:50%; background:#c0392b;"></span>
      </div>
      <!-- AI agent settings (connection + behaviour). Desktop-only: ai-src/main.js
           only wires this button up when window.manuscriptDesktop.isElectron is
           true; on mobile/plain-browser it's inert markup with no listener. -->
      <div class="sidebar-footer" id="agent-action" style="flex:1; justify-content:center;">
        <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v1.06A7.5 7.5 0 0 1 19.94 11H21a1 1 0 1 1 0 2h-1.06A7.5 7.5 0 0 1 13 19.94V21a1 1 0 1 1-2 0v-1.06A7.5 7.5 0 0 1 4.06 13H3a1 1 0 1 1 0-2h1.06A7.5 7.5 0 0 1 11 4.06V3a1 1 0 0 1 1-1zm0 4.5A5.5 5.5 0 1 0 12 17.5 5.5 5.5 0 0 0 12 6.5zm0 2.5a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
        <span>Agent</span>
      </div>
    </div>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <button class="sidebar-expand-btn" id="sidebar-expand-btn" title="Show sidebar (Ctrl+\)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>

  <!-- Main -->
  <div class="main" id="main">

    <!-- Mobile topbar -->
    <div class="topbar">
      <button class="topbar-menu" id="topbar-menu" aria-label="Menu">☰</button>
      <span class="topbar-title" id="topbar-chapter"></span>
      <span class="save-status" id="save-status"></span>
    </div>

    <!-- Page content -->
    <div class="page-wrap" id="page-wrap">
      <div class="state-msg" id="state-msg">Select a chapter to begin reading.</div>
    </div>

  </div>
  <div class="toc-trigger" id="toc-trigger"></div>
  <div class="toc-popup" id="toc-popup"></div>
</div>

<!-- Popup -->
<div class="mn-popup" id="mn-popup">
  <button class="mn-popup-delete" id="popup-delete" title="Delete Note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
  </button>
  <button class="mn-popup-close" id="popup-close">✕</button>
  <div class="mn-popup-body" id="popup-body"></div>
  <div class="mn-popup-retype" id="popup-retype" style="padding: 0 1.2rem 1rem; display:flex; gap:0.35rem; flex-wrap:wrap;">
    <button class="note-type-btn" data-retype="">note</button>
    <button class="note-type-btn" data-retype="query">query</button>
    <button class="note-type-btn" data-retype="ref">ref</button>
    <button class="note-type-btn" data-retype="todo">todo</button>
  </div>
</div>

<!-- Selection tooltip -->
<div class="sel-tooltip" id="sel-tooltip">
  <span id="tt-add-note" style="cursor:pointer;">+ note</span>
</div>

<!-- Note input sheet -->
<div class="note-sheet" id="note-sheet">
  <button class="note-sheet-save" id="sheet-save" title="Save note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
  </button>
  <button class="note-sheet-cancel" id="sheet-cancel" title="Cancel">✕</button>
  
  <div class="note-sheet-context" id="sheet-context"></div>
  <div class="note-type-row" id="note-type-row">
    <button class="note-type-btn active" data-type="">note</button>
    <button class="note-type-btn" data-type="query">query</button>
    <button class="note-type-btn" data-type="ref">ref</button>
    <button class="note-type-btn" data-type="todo">todo</button>
  </div>
  <textarea id="sheet-input" placeholder="Your note…" rows="3"></textarea>
</div>

<!-- New document modal -->
<div class="newdoc-overlay" id="newdoc-overlay">
  <div class="newdoc-modal" id="newdoc-modal">
    <div class="newdoc-head">
      <span class="newdoc-title" id="newdoc-title">New Document</span>
      <button class="newdoc-close" id="newdoc-close">✕</button>
    </div>
    <div class="newdoc-body">
      <label for="newdoc-input">Title</label>
      <input type="text" id="newdoc-input" placeholder="e.g. Chapter Two" autocomplete="off">
    </div>
    <div class="newdoc-foot">
      <button class="newdoc-cancel" id="newdoc-cancel">Cancel</button>
      <button class="newdoc-create" id="newdoc-create">Create</button>
    </div>
  </div>
</div>

<!-- Vault folder picker modal -->
<div class="vault-picker-overlay" id="vault-picker-overlay">
  <div class="vault-picker" id="vault-picker">
    <div class="vault-picker-head">
      <span class="vault-picker-title">Select Vault Folder</span>
      <button class="vault-picker-close" id="vault-picker-close">✕</button>
    </div>
    <div class="vault-picker-crumb" id="vault-picker-crumb"></div>
    <div class="vault-picker-list" id="vault-picker-list"></div>
    <div class="vault-picker-foot">
      <div class="vault-picker-selected" id="vault-picker-selected">No folder selected</div>
      <button class="vault-picker-confirm" id="vault-picker-confirm" disabled>Open Vault</button>
    </div>
  </div>
</div>

<!-- Settings / Sync drawer -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel" id="settings-panel">
    <div class="settings-head">
      <span class="settings-title">Sync &amp; Git</span>
      <button class="settings-close" id="settings-close">✕</button>
    </div>

    <div class="settings-body">
      <div class="settings-section">
        <label>Remote repository URL</label>
        <input type="text" id="git-remote-url" placeholder="https://github.com/you/book.git">
      </div>
      <div class="settings-section" id="git-token-section">
        <label>Personal access token</label>
        <input type="password" id="git-token" placeholder="ghp_...">
      </div>
      <div class="settings-section" id="git-token-note" style="display:none;">
        <small id="git-token-note-text">Checking how your token will be stored…</small>
      </div>
      <div class="settings-section settings-row">
        <div>
          <label>Author name</label>
          <input type="text" id="git-author-name">
        </div>
        <div>
          <label>Author email</label>
          <input type="text" id="git-author-email">
        </div>
      </div>

      <div class="settings-actions">
        <button class="settings-btn settings-btn-primary" id="git-save-config">Save</button>
        <button class="settings-btn" id="git-clone-vault">Clone Vault (first-time setup)</button>
      </div>

      <div class="settings-section sync-status" id="sync-status">
        <div id="sync-status-text">Not yet synced</div>
        <div class="sync-status-actions">
          <button class="settings-btn" id="git-pull-btn">Pull</button>
          <button class="settings-btn settings-btn-primary" id="git-push-btn">Push</button>
        </div>
      </div>

      <div class="settings-section">
        <button class="settings-btn" id="export-pdf-settings">
          <svg viewBox="0 0 24 24" style="width:12px;height:12px;vertical-align:-2px;margin-right:0.35em;"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <span id="export-pdf-settings-label">Download PDF</span>
        </button>
      </div>
    </div>
  </div>
</div>

<input type="range" id="font-size-slider" min="18" max="30" value="17" step="1">

<script src="/mn-editor.bundle.js"></script>
<script src="/mn-ai.bundle.js"></script>
<script src="/client.js"></script>
<script>
  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
